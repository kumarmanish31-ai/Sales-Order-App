<style>

    --color-accent:#E8A33D;
    --color-bg:#F3F5F4;

    --color-text:#1B2430;

    --color-success:#2F9E58;
    --color-danger:#D64545;
    --font-display:'Sora',system-ui,sans-serif;
    --font-body:'Inter',system-ui,sans-serif;

  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{

<script>
/* =========================================================
   CONFIG — paste your own Firebase project config here to
   enable real-time shared data across every phone on your
   team. Leave as-is to run in single-device (local) mode.
   See README.md for the 5-minute setup.
   ========================================================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const INDIA_STATES = ["Andhra Pradesh","Arunachal Pradesh","Assam","Bihar","Chhattisgarh","Goa","Gujarat","Haryana",
"Himachal Pradesh","Jharkhand","Karnataka","Kerala","Madhya Pradesh","Maharashtra","Manipur","Meghalaya","Mizoram",
"Nagaland","Odisha","Punjab","Rajasthan","Sikkim","Tamil Nadu","Telangana","Tripura","Uttar Pradesh","Uttarakhand",
"West Bengal","Andaman and Nicobar Islands","Chandigarh","Dadra and Nagar Haveli and Daman and Diu","Delhi",
"Jammu and Kashmir","Ladakh","Lakshadweep","Puducherry"];

const GST_SLABS = [0,5,12,18,28];
const UNIT_OPTIONS = ["Pcs","Kg","Rolls"];
const MAX_PO_FILE_BYTES = 500*1024; // keep PO attachments small enough to fit inside one Firestore document

/* ---------------- Utilities ---------------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function norm(s){ return String(s||'').trim().toLowerCase(); }
function formatNum(n){ return (Number(n)||0).toFixed(2); }
function formatCurrencyINR(n){ return '₹' + (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function formatDateDMY(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function showToast(msg){
  const slot = document.getElementById('toast-slot');
  slot.innerHTML = `<div class="toast">${esc(msg)}</div>`;
  setTimeout(()=>{ slot.innerHTML=''; }, 2200);
}
function base64ToBytes(dataUrl){
  const base64 = dataUrl.includes(',') ? dataUrl.split(',')[1] : dataUrl;
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

/* ---------------- Storage layer ---------------- */
const LS_PREFIX = 'sob_';
let firebaseReady = false, db = null;

function tryInitFirebase(){
  if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "YOUR_API_KEY") return false;
  try{
    if (typeof firebase === 'undefined') return false;
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    return true;
  }catch(e){ console.error('Firebase init failed', e); return false; }
}

const Store = {
  mode:'local',
  init(){ this.mode = tryInitFirebase() ? 'firebase' : 'local'; },

  watchCompany(cb){
    if (this.mode==='firebase'){
      return db.collection('meta').doc('company').onSnapshot(
        snap => cb(snap.exists ? snap.data() : null),
        ()=>{ this.mode='local'; updateSyncIndicator(); cb(this._localCompany()); }
      );
    }
    cb(this._localCompany());
    return ()=>{};
  },
  _localCompany(){
    const raw = localStorage.getItem(LS_PREFIX+'company');
    return raw ? JSON.parse(raw) : null;
  },
  async saveCompany(data){
    if (this.mode==='firebase'){
      await db.collection('meta').doc('company').set(data, {merge:true});
    } else {
      localStorage.setItem(LS_PREFIX+'company', JSON.stringify(data));
      window.dispatchEvent(new Event('sob-local-update-company'));
    }
  },

  watchCollection(name, cb){
    if (this.mode==='firebase'){
      return db.collection(name).onSnapshot(
        snap => { const items=[]; snap.forEach(d=>items.push({id:d.id, ...d.data()})); cb(items); },
        ()=>{ this.mode='local'; updateSyncIndicator(); cb(this._localList(name)); }
      );
    }
    const read = ()=>cb(this._localList(name));
    read();
    window.addEventListener('sob-local-update-'+name, read);
    return ()=>window.removeEventListener('sob-local-update-'+name, read);
  },
  _localList(name){
    const raw = localStorage.getItem(LS_PREFIX+name);
    return raw ? JSON.parse(raw) : [];
  },
  async upsert(name, item){
    if (this.mode==='firebase'){
      if (item.id){ const id=item.id; const data={...item}; delete data.id;
        await db.collection(name).doc(id).set(data, {merge:true}); return id; }
      const ref = await db.collection(name).add(item); return ref.id;
    }
    const list = this._localList(name);
    if (item.id){
      const idx = list.findIndex(x=>x.id===item.id);
      if (idx>=0) list[idx]=item; else list.push(item);
    } else { item.id = uid(); list.push(item); }
    localStorage.setItem(LS_PREFIX+name, JSON.stringify(list));
    window.dispatchEvent(new Event('sob-local-update-'+name));
    return item.id;
  },
  async remove(name, id){
    if (this.mode==='firebase'){ await db.collection(name).doc(id).delete(); return; }
    const list = this._localList(name).filter(x=>x.id!==id);
    localStorage.setItem(LS_PREFIX+name, JSON.stringify(list));
    window.dispatchEvent(new Event('sob-local-update-'+name));
  }
};

function updateSyncIndicator(){
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (Store.mode==='firebase'){
    el.innerHTML = '<span class="dot on"></span><span>Synced</span>';
  } else {
    el.innerHTML = '<span class="dot off"></span><span>Local only</span>';
  }
}

/* ---------------- App state ---------------- */
const state = {
  view: 'new-order',
  company: { name:'', address:'', gstin:'', state:'', phone:'', email:'', orderPrefix:'SO-', nextSeq:1 },
  products: [],
  parties: [],
  orders: [],
  draft: null,
  ui: {
    showPartyPicker:false,
    editingParty:null,
    editingProduct:null,
    selectedOrderId:null,
    ordersSearch:'',
    importRows:null,
    importTarget:null,
  }
};

function newDraft(){
  return {
    id:null,
    orderNo:'',
    date: todayISO(),
    partyId:null,
    partySnapshot:null,
    items:[],
    notes:'',
    poNumber:'',
    poDate:'',
    poFile:null, // {name, type, dataBase64}
    paymentTerm:'',
    transporterName:'',
    deliveryType:'',
    freightTerm:''
  };
}

/* ---------------- Order math ---------------- */
function computeOrderTotals(items, party, company){
  let subtotal=0, cgst=0, sgst=0, igst=0;
  const sameState = party && company && party.state && company.state && norm(party.state)===norm(company.state);
  const lines = items.map(it=>{
    const qty = Number(it.qty)||0, rate=Number(it.rate)||0, gstPct=Number(it.gst)||0;
    const amount = round2(qty*rate);
    const gstAmt = round2(amount*gstPct/100);
    let c=0,s=0,i=0;
    if (gstAmt>0){
      if (sameState){ c=round2(gstAmt/2); s=round2(gstAmt-c); } else { i=gstAmt; }
    }
    subtotal+=amount; cgst+=c; sgst+=s; igst+=i;
    return {...it, amount, gstAmt, cgst:c, sgst:s, igst:i};
  });
  const grandTotal = round2(subtotal+cgst+sgst+igst);
  return {lines, subtotal:round2(subtotal), cgst:round2(cgst), sgst:round2(sgst), igst:round2(igst), grandTotal, sameState};
}

/* ---------------- Rendering: shell ---------------- */
const NAV_ITEMS = [
  {key:'new-order', label:'New', icon:'M12 5v14M5 12h14'},
  {key:'orders', label:'Orders', icon:'M4 6h16M4 12h16M4 18h10'},
  {key:'parties', label:'Parties', icon:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75'},
  {key:'products', label:'Products', icon:'M21 8 12 3 3 8l9 5 9-5ZM3 8v9l9 5 9-5V8M12 13v9'},
  {key:'settings', label:'Settings', icon:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.37a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.63 15 1.7 1.7 0 0 0 3.07 14H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.63 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.63 1.7 1.7 0 0 0 10 3.07V3a2 2 0 1 1 4 0v.09c0 .69.4 1.32 1 1.56.6.25 1.3.13 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.47.47-.6 1.17-.34 1.87.24.6.87 1 1.56 1H21a2 2 0 1 1 0 4h-.09c-.69 0-1.32.4-1.56 1Z'}
];

function renderBottomNav(){

function renderTopbar(){
  document.getElementById('company-name-display').textContent = state.company.name || 'Sales Order Book';
  document.getElementById('company-sub').textContent = state.company.gstin ? `GSTIN: ${state.company.gstin}` : 'Tap Settings to set up your business';
  updateSyncIndicator();
  const banner = document.getElementById('local-banner-slot');
  if (Store.mode==='local'){
    banner.innerHTML = `<div class="local-banner"><b>Running in single-device mode.</b> Data stays on this phone only. Add your Firebase config (see README) to sync orders &amp; parties across your whole team.</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function render(){
  renderTopbar();
  renderBottomNav();
  const c = document.getElementById('content');
  try{
    if (state.view==='new-order') c.innerHTML = viewNewOrder();
    else if (state.view==='orders') c.innerHTML = viewOrders();
    else if (state.view==='order-detail') c.innerHTML = viewOrderDetail();
    else if (state.view==='parties') c.innerHTML = viewParties();
    else if (state.view==='party-detail') c.innerHTML = viewPartyDetail();
    else if (state.view==='products') c.innerHTML = viewProducts();
    else if (state.view==='settings') c.innerHTML = viewSettings();
    afterRenderHook();
  }catch(e){
    console.error(e);
    c.innerHTML = `<div class="card"><b>Something went wrong rendering this screen.</b><br><span style="color:var(--color-text-muted);font-size:12px">${esc(e.message)}</span></div>`;
  }
}
function afterRenderHook(){
  if (state.view==='new-order') refreshTotalsOnly();
}

/* =========================================================
   VIEW: NEW ORDER
   ========================================================= */
function viewNewOrder(){
  if (!state.draft) state.draft = newDraft();
  const d = state.draft;
  const party = d.partySnapshot;

  const partyBlock = party ? `
    <div class="party-line" onclick="App.openPartyPicker()">
      <div class="item-row-head">
        <span class="name">${esc(party.name)}</span>
        <button class="icon-btn" onclick="event.stopPropagation();App.openPartyPicker()">Change</button>
      </div>
      <div class="helper-text" style="margin:0">
        ${party.gstin?`GSTIN: ${esc(party.gstin)} · `:''}${esc(party.state||'')}
      </div>
    </div>` : `
    <button class="btn btn-outline" onclick="App.openPartyPicker()">+ Select Party</button>`;

  const itemsHtml = d.items.length ? d.items.map(it=>renderItemRow(it)).join('') :
    `<div class="empty-state" style="padding:22px 8px"><span class="big">🧾</span>No items yet. Add one below.</div>`;

  return `
    <h2 class="section-title">New Sales Order</h2>
    <div class="card">
      <div class="order-serial" style="margin-bottom:8px">Order No. ${esc(d.orderNo || '(auto)')}</div>
      <div class="perforation"></div>
      <label class="field-label">Party</label>
      ${partyBlock}
      <div class="row" style="margin-top:10px">
        <div>
          <label class="field-label">Order Date</label>
          <input type="date" id="draft-date" value="${esc(d.date)}" oninput="App.onDraftField('date', this.value)">
        </div>
        <div>
          <label class="field-label">Order No.</label>
          <input type="text" id="draft-orderno" placeholder="auto" value="${esc(d.orderNo)}" oninput="App.onDraftField('orderNo', this.value)">
        </div>
      </div>
    </div>

    <div class="card">
      <label class="field-label">Party PO Details (optional)</label>
      <div class="row">
        <div>
          <label class="field-label">PO Number</label>
          <input type="text" id="draft-pono" placeholder="Customer's PO No." value="${esc(d.poNumber)}" oninput="App.onDraftField('poNumber', this.value)">
        </div>
        <div>
          <label class="field-label">PO Date</label>
          <input type="date" id="draft-podate" value="${esc(d.poDate)}" oninput="App.onDraftField('poDate', this.value)">
        </div>
      </div>
      <div id="po-file-area">${renderPoFileArea(d.poFile)}</div>
      <input type="file" id="po-file-input" accept="application/pdf,image/*" style="display:none" onchange="App.handlePoFile(event)">
      <label class="field-label">Payment Term</label>
      <input type="text" id="draft-paymentterm" list="payment-term-list" placeholder="e.g. 30 Days Credit" value="${esc(d.paymentTerm)}" oninput="App.onDraftField('paymentTerm', this.value)">
    </div>

    <div class="card">
      <label class="field-label">Items</label>
      <div id="items-container">${itemsHtml}</div>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" onclick="App.addItem('list')">+ Pick from list</button>
        <button class="btn btn-outline btn-sm" onclick="App.addItem('manual')">+ Type manually</button>
      </div>
    </div>

    <div class="totals-card" id="totals-card">
      ${renderTotalsInner(computeOrderTotals(d.items, party, state.company))}
    </div>

    <div class="card">
      <label class="field-label">Transport Details (optional)</label>
      <label class="field-label" style="margin-top:0">Transporter Name</label>
      <input type="text" id="draft-transporter" placeholder="e.g. ABC Roadways" value="${esc(d.transporterName)}" oninput="App.onDraftField('transporterName', this.value)">
      <div class="row">
        <div>
          <label class="field-label">Delivery</label>
          <select id="draft-delivery" onchange="App.onDraftField('deliveryType', this.value)">

            <option value="Godown" ${d.deliveryType==='Godown'?'selected':''}>Godown Delivery</option>
            <option value="Door" ${d.deliveryType==='Door'?'selected':''}>Door Delivery</option>
          </select>
        </div>
        <div>
          <label class="field-label">Freight</label>
          <div class="unit-tabs" id="freighttabs">${renderFreightTabs(d.freightTerm)}</div>

      </div>
    </div>

      <label class="field-label">Notes (optional)</label>
      <textarea id="draft-notes" placeholder="Delivery terms, payment terms, etc." oninput="App.onDraftField('notes', this.value)">${esc(d.notes)}</textarea>

const FREIGHT_OPTIONS = ["Paid","To Pay"];
const PAYMENT_TERM_OPTIONS = ["Advance","Cash on Delivery","7 Days Credit","15 Days Credit","30 Days Credit","45 Days Credit","60 Days Credit","Against Delivery","Cheque"];
function renderFreightTabs(selected){
  return FREIGHT_OPTIONS.map(f=>
    `<button type="button" class="unit-tab ${norm(f)===norm(selected)?'active':''}" onclick="App.setFreightTerm('${f}')">${f}</button>`
  ).join('');
}

function renderPoFileArea(file){
  if (!file) return `
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('po-file-input').click()">⇧ Upload PO Copy</button>
    <div class="helper-text">PDF or photo of the customer's PO, max 500KB. It'll be merged into the order PDF as an extra page.</div>`;
  return `
    <div class="filechip" style="cursor:default;justify-content:space-between">
      <span>📎 ${esc(file.name)}</span>
      <button class="icon-btn danger" onclick="App.removePoFile()">✕ Remove</button>
    </div>`;
}

function renderTotalsInner(t){
  return `
    <div class="totals-row"><span>Subtotal</span><span class="val">${formatCurrencyINR(t.subtotal)}</span></div>
    ${t.cgst>0?`<div class="totals-row"><span>CGST</span><span class="val">${formatCurrencyINR(t.cgst)}</span></div>`:''}
    ${t.sgst>0?`<div class="totals-row"><span>SGST</span><span class="val">${formatCurrencyINR(t.sgst)}</span></div>`:''}
    ${t.igst>0?`<div class="totals-row"><span>IGST</span><span class="val">${formatCurrencyINR(t.igst)}</span></div>`:''}
    <div class="totals-row grand"><span>Grand Total</span><span class="val">${formatCurrencyINR(t.grandTotal)}</span></div>
  `;
}

function refreshTotalsOnly(){
  const card = document.getElementById('totals-card');
  if (!card || !state.draft) return;
  const t = computeOrderTotals(state.draft.items, state.draft.partySnapshot, state.company);
  card.innerHTML = renderTotalsInner(t);
}

function renderUnitTabs(lid, selected){
  return UNIT_OPTIONS.map(u=>
    `<button type="button" class="unit-tab ${norm(u)===norm(selected)?'active':''}" onclick="App.setLineUnit('${lid}','${u}')">${u}</button>`
  ).join('');
}

function renderItemRow(it){
  const lid = it.id;
  const amount = round2((Number(it.qty)||0)*(Number(it.rate)||0));
  const nameField = it.source==='list' ? `
      <select id="prod-${lid}" onchange="App.onProductPick('${lid}', this.value)">
        <option value="">Select product…</option>
        ${state.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?'selected':''}>${esc(p.name)}</option>`).join('')}
      </select>` : `
      <input type="text" id="name-${lid}" placeholder="Item name" value="${esc(it.name)}" oninput="App.onLineField('${lid}','name',this.value)">`;

  return `
    <div class="item-row" id="row-${lid}">
      <div class="item-row-head">
        <span class="name">Item</span>
        <div>
          <button class="pill" onclick="App.toggleLineSource('${lid}')">${it.source==='list'?'Switch to manual':'Switch to list'}</button>
          <button class="icon-btn danger" onclick="App.removeItem('${lid}')">✕</button>
        </div>
      </div>
      ${nameField}
      <div class="row">
        <div>
          <label class="field-label">Qty</label>
          <input type="number" min="0" step="any" id="qty-${lid}" value="${it.qty}" oninput="App.onLineField('${lid}','qty',this.value)">
        </div>
        <div style="flex:1.3">
          <label class="field-label">Unit</label>
          <div class="unit-tabs" id="unittabs-${lid}">${renderUnitTabs(lid, it.unit)}</div>
        </div>
      </div>
      <div class="row">
        <div>
          <label class="field-label">GSM</label>
          <input type="number" min="0" step="any" id="gsm-${lid}" placeholder="e.g. 120" value="${it.gsmValue||''}" oninput="App.onLineField('${lid}','gsmValue',this.value)">
        </div>
        <div>
          <label class="field-label">Meter</label>
          <input type="number" min="0" step="any" id="meter-${lid}" placeholder="e.g. 50" value="${it.meterValue||''}" oninput="App.onLineField('${lid}','meterValue',this.value)">
        </div>
      </div>
      <div class="row">
        <div>
          <label class="field-label">Rate (₹)</label>
          <input type="number" min="0" step="any" id="rate-${lid}" value="${it.rate}" oninput="App.onLineField('${lid}','rate',this.value)">
        </div>
        <div>
          <label class="field-label">GST %</label>
          <input type="number" min="0" step="any" list="gst-list" id="gst-${lid}" value="${it.gst}" oninput="App.onLineField('${lid}','gst',this.value)">
        </div>
      </div>
      <div style="text-align:right;font-size:13px;color:var(--color-text-muted)">
        Line amount: <span class="ledger" id="lineAmt-${lid}">${formatCurrencyINR(amount)}</span>
      </div>
    </div>
  `;
}

function renderPartyPicker(){
  const filtered = state.parties;
  return `
  <div class="modal-overlay" onclick="App.closePartyPicker(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h3>Select Party</h3>
      <input type="text" id="party-search-input" placeholder="Search by name or GSTIN" oninput="App.filterPartyResults(this.value)">
      <div id="party-results">${renderPartyResults(state.parties)}</div>
      <button class="btn btn-outline" onclick="App.closePartyPicker(); App.openAddParty(true)">+ Add New Party</button>
    </div>
  </div>`;
}
function renderPartyResults(list){
  if (!list.length) return `<div class="empty-state" style="padding:16px">No parties found.</div>`;
  return list.map(p=>`
    <div class="list-card" onclick="App.pickParty('${p.id}')">
      <div class="top-line"><span class="name">${esc(p.name)}</span></div>
      <div class="meta">${p.gstin?'GSTIN: '+esc(p.gstin)+' · ':''}${esc(p.state||'')}</div>
    </div>`).join('');
}

/* =========================================================
   VIEW: ORDERS LIST + DETAIL
   ========================================================= */
function itemsSummaryText(o){
  return o.items.map(it=>`${it.name} ×${it.qty}`).join(', ');
}

function viewOrders(){
  const q = norm(state.ui.ordersSearch);
  let list = state.orders.slice().sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
  if (q) list = list.filter(o => norm(o.orderNo).includes(q) || norm(o.partySnapshot?.name).includes(q));

  const items = list.length ? list.map(o=>`
    <div class="list-card" onclick="App.openOrder('${o.id}','orders')">
      <div class="top-line">
        <span class="name">${esc(o.partySnapshot?.name || 'No party')}</span>
        <span class="amt">${formatCurrencyINR(o.grandTotal)}</span>
      </div>
      <div class="meta">${esc(o.orderNo)} · ${formatDateDMY(o.date)} · ${o.items.length} item${o.items.length===1?'':'s'}</div>
      <div class="meta" style="margin-top:3px">${esc(itemsSummaryText(o))}</div>
      ${o.notes?`<div class="meta" style="margin-top:3px;font-style:italic">📝 ${esc(o.notes)}</div>`:''}
    </div>`).join('') : `<div class="empty-state"><span class="big">📋</span>No sales orders yet.</div>`;

  return `
    <h2 class="section-title">Sales Orders</h2>
    <input type="text" placeholder="Search order no. or party" value="${esc(state.ui.ordersSearch)}" oninput="App.setOrdersSearch(this.value)">
    <div class="btn-row" style="margin-bottom:14px">
      <button class="btn btn-outline btn-sm" onclick="App.exportOrdersExcel()">⇩ Export All to Excel</button>
    </div>
    <div id="orders-list">${items}</div>
  `;
}

function specText(it){
  const parts=[];
  if (it.gsmValue) parts.push(it.gsmValue+'g');
  if (it.meterValue) parts.push(it.meterValue+'m');
  return parts.length ? parts.join('/') : '-';
}

function viewOrderDetail(){
  const o = state.orders.find(x=>x.id===state.ui.selectedOrderId);
  if (!o) return `<div class="empty-state">Order not found.</div>`;
  const itemsRows = o.items.map((it,i)=>`
    <tr><td>${i+1}</td><td>${esc(it.name)}</td><td>${it.qty} ${esc(it.unit||'')}</td><td>${specText(it)}</td><td>${formatNum(it.rate)}</td><td>${it.gst}%</td><td>${formatNum(it.amount)}</td></tr>`).join('');
  return `
    <button class="btn-ghost" style="padding:0 0 10px;border:none;background:none;font-weight:600" onclick="App.goTo('${state.ui.orderReturnView||'orders'}')">← Back</button>
    <h2 class="section-title">${esc(o.orderNo)}</h2>
    <div class="card">
      <div class="meta" style="color:var(--color-text-muted);font-size:12.5px">Date: ${formatDateDMY(o.date)}</div>
      <div style="margin-top:8px"><b>${esc(o.partySnapshot?.name||'')}</b><br>
        <span style="font-size:12.5px;color:var(--color-text-muted)">${o.partySnapshot?.gstin?'GSTIN: '+esc(o.partySnapshot.gstin)+' · ':''}${esc(o.partySnapshot?.state||'')}</span>
      </div>
      ${o.poNumber||o.poFile||o.paymentTerm?`<div class="meta" style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--color-border)">
        ${o.poNumber?`PO No: <b>${esc(o.poNumber)}</b>`:''} ${o.poDate?'· '+formatDateDMY(o.poDate):''} ${o.paymentTerm?'· Payment Term: '+esc(o.paymentTerm):''} ${o.poFile?'· 📎 '+esc(o.poFile.name)+' (will merge into PDF)':''}
      </div>`:''}
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="preview-table">
        <thead><tr><th>#</th><th>Item</th><th>Qty</th><th>GSM/Mtr</th><th>Rate</th><th>GST</th><th>Amt</th></tr></thead>
        <tbody>${itemsRows}</tbody>
      </table>
    </div>
    <div class="totals-card">${renderTotalsInner(o)}</div>
    ${o.notes?`<div class="card"><label class="field-label">Notes</label>${esc(o.notes)}</div>`:''}
    ${(o.transporterName||o.deliveryType||o.freightTerm)?`<div class="card">
      <label class="field-label">Transport Details</label>
      ${o.transporterName?`<div style="font-size:13px">Transporter: <b>${esc(o.transporterName)}</b></div>`:''}
      <div style="font-size:13px;margin-top:3px;color:var(--color-text-muted)">
        ${o.deliveryType?esc(o.deliveryType)+' Delivery':''} ${o.freightTerm?'· Freight: '+esc(o.freightTerm):''}
      </div>
    </div>`:''}
    <div class="btn-row">
      <button class="btn btn-primary btn-sm" onclick="App.downloadOrderPDF('${o.id}')">⇩ PDF</button>
      <button class="btn btn-accent btn-sm" onclick="App.shareOrderWhatsApp('${o.id}')">WhatsApp</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline btn-sm" onclick="App.editOrder('${o.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="App.deleteOrder('${o.id}')">Delete</button>
    </div>
  `;
}

/* =========================================================
   VIEW: PARTIES
   ========================================================= */
function viewParties(){
  const list = state.parties.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const items = list.length ? list.map(p=>`
    <div class="list-card" onclick="App.openEditParty('${p.id}')">
      <div class="top-line"><span class="name">${esc(p.name)}</span><span class="badge">${esc(p.state||'—')}</span></div>
      <div class="meta">${p.gstin?'GSTIN: '+esc(p.gstin):'No GSTIN'}${p.phone?' · '+esc(p.phone):''}</div>
      <div style="margin-top:7px"><button class="pill" onclick="event.stopPropagation();App.openPartyDetail('${p.id}')">📋 Order History</button></div>
    </div>`).join('') : `<div class="empty-state"><span class="big">🧑‍💼</span>No parties yet. Add one or import from Excel.</div>`;

  return `
    <h2 class="section-title">Parties</h2>
    <div class="btn-row" style="margin-bottom:12px">

      <button class="btn btn-outline btn-sm" onclick="App.triggerImport('parties')">⇧ Import Excel</button>
    </div>
    <button class="btn btn-ghost btn-sm" style="width:auto;padding:0;margin-bottom:14px" onclick="App.downloadPartyTemplate()">Download Excel template</button>
    <div id="parties-list">${items}</div>
    <input type="file" id="party-import-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="App.handleImportFile(event,'parties')">
  `;

/* =========================================================
   VIEW: PARTY DETAIL (order history)
   ========================================================= */
function viewPartyDetail(){
  const p = state.parties.find(x=>x.id===state.ui.selectedPartyId);
  if (!p) return `<div class="empty-state">Party not found.</div>`;
  const orders = state.orders.filter(o =>
    o.partyId===p.id || (o.partySnapshot && norm(o.partySnapshot.name)===norm(p.name) && norm(o.partySnapshot.gstin||'')===norm(p.gstin||''))
  ).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const totalValue = orders.reduce((s,o)=>s+(Number(o.grandTotal)||0),0);

  const list = orders.length ? orders.map(o=>`
    <div class="list-card" onclick="App.openOrder('${o.id}','party-detail')">
      <div class="top-line"><span class="name">${esc(o.orderNo)}</span><span class="amt">${formatCurrencyINR(o.grandTotal)}</span></div>
      <div class="meta">${formatDateDMY(o.date)} · ${o.items.length} item${o.items.length===1?'':'s'}${o.poNumber?' · PO '+esc(o.poNumber):''}</div>
      <div class="meta" style="margin-top:3px">${esc(itemsSummaryText(o))}</div>
      ${o.notes?`<div class="meta" style="margin-top:3px;font-style:italic">📝 ${esc(o.notes)}</div>`:''}
    </div>`).join('') : `<div class="empty-state"><span class="big">🧾</span>No orders yet for this party.</div>`;

  return `
    <button class="btn-ghost" style="padding:0 0 10px;border:none;background:none;font-weight:600" onclick="App.goTo('parties')">← Back to Parties</button>
    <h2 class="section-title">${esc(p.name)}</h2>
    <div class="card">
      <div class="meta" style="font-size:12.5px;color:var(--color-text-muted)">
        ${p.gstin?'GSTIN: '+esc(p.gstin)+' · ':''}${esc(p.state||'')}
      </div>
      ${p.address?`<div style="margin-top:6px;font-size:13px">${esc(p.address)}</div>`:''}
      ${p.phone||p.email?`<div style="margin-top:4px;font-size:12.5px;color:var(--color-text-muted)">${esc([p.phone,p.email].filter(Boolean).join(' · '))}</div>`:''}
      <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="App.openEditParty('${p.id}')">Edit Party</button>
    </div>
    <div class="totals-card">
      <div class="totals-row"><span>Total Orders</span><span class="val">${orders.length}</span></div>
      <div class="totals-row grand"><span>Total Value</span><span class="val">${formatCurrencyINR(totalValue)}</span></div>
    </div>
    <label class="field-label">Order History</label>
    <div>${list}</div>
  `;
}

   VIEW: SETTINGS
   ========================================================= */

      <input type="text" id="set-name" value="${esc(c.name)}">

          <label class="field-label">GSTIN</label>

  /* ---- PDF ---- */
  buildPDF(order){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'mm', format:'a4'});
    const pageW = 210, marginX = 14;
    let y = 16;
    const company = state.company;

    doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(15,92,92);
    doc.text(company.name || 'Your Company', marginX, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,60,60);
    y += 6;
    if (company.address){ doc.text(company.address, marginX, y, {maxWidth:110}); y+=4.5; }
    let gl = [company.gstin?`GSTIN: ${company.gstin}`:'', company.state?`State: ${company.state}`:''].filter(Boolean).join('   ');
    if (gl){ doc.text(gl, marginX, y); y+=4.5; }
    let cl = [company.phone, company.email].filter(Boolean).join('   ');
    if (cl){ doc.text(cl, marginX, y); y+=4.5; }

    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(15,92,92);
    doc.text('SALES ORDER', pageW-marginX, 16, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,60,60);
    doc.text(`Order No: ${order.orderNo}`, pageW-marginX, 22, {align:'right'});
    doc.text(`Date: ${formatDateDMY(order.date)}`, pageW-marginX, 27, {align:'right'});

    y = Math.max(y, 30) + 4;
    doc.setDrawColor(225,229,227); doc.line(marginX, y, pageW-marginX, y); y+=7;

    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20,20,20);
    doc.text('Bill To', marginX, y); y+=5;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    const p = order.partySnapshot || {};
    doc.text(p.name || '-', marginX, y); y+=4.5;
    if (p.address){ doc.text(String(p.address), marginX, y, {maxWidth:120}); y+=4.5; }
    let pg = [p.gstin?`GSTIN: ${p.gstin}`:'', p.state?`State: ${p.state}`:''].filter(Boolean).join('   ');
    if (pg){ doc.text(pg, marginX, y); y+=4.5; }
    if (p.phone){ doc.text(`Phone: ${p.phone}`, marginX, y); y+=4.5; }
    if (order.poNumber || order.poDate || order.paymentTerm){
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(15,92,92);
      let poLine = order.poNumber ? `PO No: ${order.poNumber}` : 'PO';
      if (order.poDate) poLine += `   PO Date: ${formatDateDMY(order.poDate)}`;
      if (order.paymentTerm) poLine += `   Payment Term: ${order.paymentTerm}`;
      doc.text(poLine, marginX, y); y+=5;
      doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60); doc.setFontSize(9.5);
    }
    y += 4;

    const cols = [
      {key:'idx', label:'#', w:8, align:'left'},
      {key:'name', label:'Item', w:46, align:'left'},
      {key:'unit', label:'Unit', w:12, align:'center'},
      {key:'spec', label:'GSM/Mtr', w:18, align:'center'},
      {key:'qty', label:'Qty', w:12, align:'right'},
      {key:'rate', label:'Rate', w:18, align:'right'},
      {key:'gst', label:'GST%', w:12, align:'right'},
      {key:'gstAmt', label:'GST Amt', w:18, align:'right'},
      {key:'amount', label:'Amount', w:20, align:'right'},
    ];
    const tableW = cols.reduce((a,c)=>a+c.w,0);
    const colX = i => { let x=marginX; for(let k=0;k<i;k++) x+=cols[k].w; return x; };

    const drawHeader = () => {
      doc.setFillColor(15,92,92); doc.rect(marginX, y, tableW, 7, 'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
      cols.forEach((c,i)=>{ const x=colX(i)+(c.align==='right'?c.w-2:2); doc.text(c.label, x, y+4.8, {align:c.align==='right'?'right':'left'}); });
      y += 7; doc.setTextColor(30,30,30); doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    };
    drawHeader();

    order.items.forEach((it, idx)=>{
      if (y > 268){ doc.addPage(); y=16; drawHeader(); }
      const rowH = 6.5;
      if (idx%2===1){ doc.setFillColor(244,246,245); doc.rect(marginX, y, tableW, rowH, 'F'); }
      const vals = { idx:String(idx+1), name:it.name, unit:it.unit||'-', spec:specText(it), qty:String(it.qty), rate:formatNum(it.rate), gst:it.gst+'%', gstAmt:formatNum(it.gstAmt), amount:formatNum(it.amount) };
      cols.forEach((c,i)=>{
        let text = String(vals[c.key]??'');
        if (c.key==='name' && text.length>26) text = text.slice(0,25)+'…';
        const x = colX(i)+(c.align==='right'?c.w-2:2);
        doc.text(text, x, y+4.4, {align:c.align==='right'?'right':'left'});
      });
      y += rowH;
    });

    doc.setDrawColor(200,200,200); doc.line(marginX, y, marginX+tableW, y); y+=6;

    const totalsX = marginX+tableW-62;
    const totalLine = (label, value, bold) => {
      doc.setFont('helvetica', bold?'bold':'normal'); doc.setFontSize(bold?10:9);
      doc.setTextColor(bold?15:60, bold?92:60, bold?92:60);
      doc.text(label, totalsX, y);
      doc.text(formatCurrencyINR(value), marginX+tableW, y, {align:'right'});
      y += bold?6:5;
    };
    totalLine('Subtotal', order.subtotal, false);
    if (order.cgst>0) totalLine('CGST', order.cgst, false);
    if (order.sgst>0) totalLine('SGST', order.sgst, false);
    if (order.igst>0) totalLine('IGST', order.igst, false);
    doc.setDrawColor(15,92,92); doc.line(totalsX, y-2, marginX+tableW, y-2);
    totalLine('Grand Total', order.grandTotal, true);

    if (order.transporterName || order.deliveryType || order.freightTerm){
      y += 6;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(20,20,20);
      doc.text('Transport Details', marginX, y); y+=4.5;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
      const parts = [];
      if (order.transporterName) parts.push(`Transporter: ${order.transporterName}`);
      if (order.deliveryType) parts.push(`${order.deliveryType} Delivery`);
      if (order.freightTerm) parts.push(`Freight: ${order.freightTerm}`);
      doc.text(parts.join('   ·   '), marginX, y); y+=4.5;
    }

    if (order.notes){
      y+=6; doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(20,20,20);
      doc.text('Notes', marginX, y); y+=4.5;
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
      const split = doc.splitTextToSize(order.notes, tableW);
      doc.text(split, marginX, y);
    }

    if (order.poFile){
      y += order.notes ? 6 : 6;
      doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(100,100,100);
      doc.text('Customer PO copy attached on the following page(s).', marginX, y);
    }

    const pageCount = doc.internal.getNumberOfPages();
    for (let i=1;i<=pageCount;i++){
      doc.setPage(i); doc.setFontSize(7.5); doc.setTextColor(150,150,150);
      doc.text(`${company.name||''}  ·  Generated by Sales Order Book`, marginX, 290);
      doc.text(`Page ${i} of ${pageCount}`, 210-marginX, 290, {align:'right'});
    }
    return doc;
  },
  async getCombinedPdfBlob(order){
    const orderDoc = this.buildPDF(order);
    const orderBytes = orderDoc.output('arraybuffer');
    if (!order.poFile || typeof PDFLib === 'undefined'){
      return new Blob([orderBytes], {type:'application/pdf'});
    }
    try{
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.load(orderBytes);
      const fileBytes = base64ToBytes(order.poFile.dataBase64);
      const isPdf = (order.poFile.type||'').includes('pdf') || /\.pdf$/i.test(order.poFile.name||'');
      if (isPdf){
        const poDoc = await PDFDocument.load(fileBytes);
        const copied = await merged.copyPages(poDoc, poDoc.getPageIndices());
        copied.forEach(pg => merged.addPage(pg));
      } else {
        const isPng = (order.poFile.type||'').includes('png');
        const img = isPng ? await merged.embedPng(fileBytes) : await merged.embedJpg(fileBytes);
        const pageW = 595.28, pageH = 841.89, margin = 28;
        const maxW = pageW - margin*2, maxH = pageH - margin*2;
        const scale = Math.min(maxW/img.width, maxH/img.height, 1);
        const w = img.width*scale, h = img.height*scale;
        const page = merged.addPage([pageW, pageH]);
        page.drawImage(img, { x:(pageW-w)/2, y:(pageH-h)/2, width:w, height:h });
      }
      const mergedBytes = await merged.save();
      return new Blob([mergedBytes], {type:'application/pdf'});
    }catch(e){
      console.error('PO merge failed, falling back to order PDF only', e);
      showToast('Could not merge PO file — sharing order PDF only');
      return new Blob([orderBytes], {type:'application/pdf'});
    }
  },
  async downloadOrderPDF(id){
    const o = state.orders.find(x=>x.id===id);
    const blob = await this.getCombinedPdfBlob(o);
    downloadBlob(blob, `${o.orderNo}.pdf`);
  },
  async shareOrderWhatsApp(id){
    const o = state.orders.find(x=>x.id===id);
    const blob = await this.getCombinedPdfBlob(o);
    const fileName = `${o.orderNo}.pdf`;
    const text = `Sales Order ${o.orderNo} for ${o.partySnapshot?.name||''} — Total ${formatCurrencyINR(o.grandTotal)}`;
    try{
      const file = new File([blob], fileName, {type:'application/pdf'});
      if (navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:`Sales Order ${o.orderNo}`, text});
        return;
      }
    }catch(e){ /* user cancelled or unsupported, fall through */ }
    downloadBlob(blob, fileName);
    window.open(`https://wa.me/?text=${encodeURIComponent(text + ' (PDF downloaded — please attach it here)')}`, '_blank');
  },

  handleImportFile(evt, target){
    const file = evt.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
        const mapped = target==='parties' ? rows.map(normalizePartyRow) : rows.map(normalizeProductRow);
        state.ui.importRows = mapped;
        renderModal(importPreviewModal(target, mapped));
      }catch(err){ showToast('Could not read that file'); console.error(err); }
    };
    reader.readAsArrayBuffer(file);
    evt.target.value = '';
  },
  async confirmImport(target){
    const rows = state.ui.importRows.filter(r=>r.name);
    for (const r of rows){ await Store.upsert(target, {...r, id:null}); }
    closeModal(); render();
    showToast(`Imported ${rows.length} ${target}`);
  },
  exportOrdersExcel(){
    const rows = state.orders.map(o=>({
      'Order No': o.orderNo, 'Date': o.date, 'Party': o.partySnapshot?.name||'',
      'GSTIN': o.partySnapshot?.gstin||'', 'PO No': o.poNumber||'', 'PO Date': o.poDate||'', 'Payment Term': o.paymentTerm||'',
      'Items': o.items.length, 'Item Details': itemsSummaryText(o), 'Notes': o.notes||'',
      'Transporter': o.transporterName||'', 'Delivery': o.deliveryType||'', 'Freight': o.freightTerm||'',
      'Subtotal': o.subtotal, 'CGST': o.cgst, 'SGST': o.sgst, 'IGST': o.igst, 'Grand Total': o.grandTotal
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Orders + PO');
    XLSX.writeFile(wb, 'sales_orders_export.xlsx');
  },
  downloadPartyTemplate(){
    const ws = XLSX.utils.json_to_sheet([
      {Name:'Acme Traders', GSTIN:'27AAACA1234A1Z5', State:'Maharashtra', Address:'123 MG Road, Nagpur', Phone:'9876543210', Email:'acme@example.com'}
    ]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Parties');
    XLSX.writeFile(wb, 'party_import_template.xlsx');
  },
};

function normalizePartyRow(r){
  const get = (...keys) => { for (const k of keys){ for (const rk of Object.keys(r)){ if (norm(rk)===norm(k)) return String(r[rk]).trim(); } } return ''; };
  return {
    name: get('Name','Party Name','Party'),
    gstin: get('GSTIN','GST No','GST Number','GST'),
    state: get('State'),
    address: get('Address'),
    phone: get('Phone','Mobile','Contact'),
    email: get('Email'),
  };
}
function normalizeProductRow(r){
  const get = (...keys) => { for (const k of keys){ for (const rk of Object.keys(r)){ if (norm(rk)===norm(k)) return String(r[rk]).trim(); } } return ''; };
  return {
    name: get('Name','Product','Item','Item Name'),
    unit: get('Unit') || 'Pcs',
    rate: Number(get('Rate','Price'))||0,
    gst: Number(get('GST','GST%','GST Rate'))||0,
  };
}

/* ---------------- Modals ---------------- */
function renderModal(html){ document.getElementById('modal-slot').innerHTML = html; }
function closeModal(){ document.getElementById('modal-slot').innerHTML=''; }

function partyFormModal(){
  const p = state.ui.editingParty;
  return `
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h3>${p.id?'Edit Party':'Add Party'}</h3>
      <label class="field-label">Name</label>
      <input type="text" id="pf-name" value="${esc(p.name)}">
      <label class="field-label">GSTIN</label>
      <input type="text" id="pf-gstin" value="${esc(p.gstin)}">
      <label class="field-label">State</label>
      <select id="pf-state"><option value="">Select…</option>${INDIA_STATES.map(s=>`<option value="${s}" ${s===p.state?'selected':''}>${s}</option>`).join('')}</select>
      <label class="field-label">Address</label>
      <textarea id="pf-address">${esc(p.address)}</textarea>
      <div class="row">
        <div><label class="field-label">Phone</label><input type="tel" id="pf-phone" value="${esc(p.phone)}"></div>
        <div><label class="field-label">Email</label><input type="email" id="pf-email" value="${esc(p.email)}"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.saveParty()">Save</button>
      </div>
      ${p.id?`<button class="btn btn-danger" style="margin-top:8px" onclick="App.deleteParty()">Delete Party</button>`:''}
    </div>
  </div>`;
}

function productFormModal(){
  const p = state.ui.editingProduct;
  return `
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h3>${p.id?'Edit Product':'Add Product'}</h3>
      <label class="field-label">Name</label>
      <input type="text" id="prf-name" value="${esc(p.name)}">
      <div class="row">
        <div>
          <label class="field-label">Rate (₹)</label>
          <input type="number" step="any" id="prf-rate" value="${p.rate}">
        </div>
        <div>
          <label class="field-label">GST %</label>
          <input type="number" step="any" list="gst-list" id="prf-gst" value="${p.gst}">
        </div>
      </div>
      <label class="field-label">Unit</label>
      <input type="hidden" id="prf-unit" value="${esc(p.unit)}">
      <div class="unit-tabs" id="unittabs-prod">${UNIT_OPTIONS.map(u=>
        `<button type="button" class="unit-tab ${norm(u)===norm(p.unit)?'active':''}" onclick="App.setProductUnit('${u}')">${u}</button>`
      ).join('')}</div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.saveProduct()">Save</button>
      </div>
      ${p.id?`<button class="btn btn-danger" style="margin-top:8px" onclick="App.deleteProduct()">Delete Product</button>`:''}
    </div>
  </div>`;
}

function importPreviewModal(target, rows){
  const cols = target==='parties' ? ['name','gstin','state','phone'] : ['name','unit','rate','gst'];
  const head = target==='parties' ? ['Name','GSTIN','State','Phone'] : ['Name','Unit','Rate','GST%'];
  const body = rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('');
  return `
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h3>Import Preview — ${rows.length} rows found</h3>
      <div style="overflow-x:auto;max-height:300px">
        <table class="preview-table"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.confirmImport('${target}')">Import All</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- Datalists (shared) ---------------- */
function injectDatalists(){
  const dl = document.createElement('div');
  dl.innerHTML = `
    <datalist id="gst-list">${GST_SLABS.map(g=>`<option value="${g}">`).join('')}</datalist>
    <datalist id="payment-term-list">${PAYMENT_TERM_OPTIONS.map(p=>`<option value="${esc(p)}">`).join('')}</datalist>
  `;
  document.body.appendChild(dl);
}

/* ---------------- Init ---------------- */
function init(){
  injectDatalists();
  Store.init();
  Store.watchCompany(c => { if (c) state.company = {...state.company, ...c}; renderTopbar(); });
  Store.watchCollection('products', list => { state.products = list; if (state.view==='products') render(); });
  Store.watchCollection('parties', list => { state.parties = list; if (state.view==='parties') render(); });
  Store.watchCollection('orders', list => { state.orders = list; if (state.view==='orders'||state.view==='order-detail') render(); });
  render();

  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}
init();
</script>
</body>
</html>
